<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>
<link rel="stylesheet" href="../styles/main.css">
</head>
<body>

<header>
<h1>BlueStyle</h1>

<nav>
<ul>
<li><a href="../index.html">Inicio</a></li>
<li><a href="catalogo-hombre.html">Hombre</a></li>

</ul>
</nav>
</header>

<section class="carrito">

<h2>Mi Carrito</h2>

<ul class="lista-carrito">

  <li class="item-carrito">
    <img src="https://img.kwcdn.com/product/fancy/25ab6c60-0643-45d9-ac51-4ca420c87229.jpg?imageMogr2/auto-orient%7CimageView2/2/w/800/q/70/format/webp" alt="Camisa Casual" class="item-imagen">
    <div class="item-info">
      <p class="item-nombre">Camisa Casual</p>
      <p class="item-precio">$29.99</p>
    </div>
    <div class="item-cantidad">
      <label for="cantidad-1">Cantidad:</label>
      <input type="number" id="cantidad-1" name="cantidad-1" value="1" min="1">
    </div>
    <p class="item-subtotal">$29.99</p>
    <button type="button" class="btn-eliminar" aria-label="Eliminar Camisa Casual del carrito">Eliminar</button>
  </li>

  <li class="item-carrito">
    <img src="https://i.pinimg.com/236x/8c/74/e1/8c74e11507e298aabb21cbd25f7d697c.jpg" alt="Blusa Elegante" class="item-imagen">
    <div class="item-info">
      <p class="item-nombre">Blusa Elegante</p>
      <p class="item-precio">$34.99</p>
    </div>
    <div class="item-cantidad">
      <label for="cantidad-2">Cantidad:</label>
      <input type="number" id="cantidad-2" name="cantidad-2" value="1" min="1">
    </div>
    <p class="item-subtotal">$34.99</p>
    <button type="button" class="btn-eliminar" aria-label="Eliminar Blusa Elegante del carrito">Eliminar</button>
  </li>

</ul>

<!--
  Si el carrito queda vacío, reemplaza la lista <ul class="lista-carrito"> por esto:

  <p class="carrito-vacio">Tu carrito está vacío. <a href="catalogo-mujer.html">Ir al catálogo</a></p>
-->

<div class="resumen-carrito">
  <h3>Total: $64.98</h3>
  <button type="button" class="btn-primary">
    Finalizar Compra
  </button>
</div>

</section>

</body>
</html>
